<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>loper - 開発仲間募集サイト</title>
<link rel="icon" href="images/loper_MainIcon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- ヘッダー -->
  <header class="header">
    <div class="logo-area">
      <a href="kurokamiroom.html"><img src="images/loper_MainIcon.png" alt="キャラクター" class="logo-icon"></a>
      <img src="images/loper_logo.png" alt="loper" class="logo-img">
    </div>

    <div class="search-area">
      <input type="text" class="search-input" id="searchInput" placeholder="検索">
      <button class="search-btn" id="searchBtn" aria-label="検索">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
        </svg>
      </button>
    </div>

    <div class="selected-tags-dropdown" id="selectedTagsDropdown">
      <span class="selected-tags-label" id="selectedTagsLabel">選択タグ</span>
      <span class="dropdown-arrow">▽</span>
      <div class="selected-tags-pulldown" id="selectedTagsPulldown">
        <!-- JSで生成 -->
      </div>
    </div>

    <button class="clear-tags-btn" id="clearTagsBtn" aria-label="タグ選択を解除" title="選択中のタグをすべて解除">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
        <line x1="7" y1="7" x2="7.01" y2="7"></line>
        <line x1="18" y1="6" x2="6" y2="18"></line>
      </svg>
    </button>

    <button class="hamburger-btn" id="hamburgerBtn" aria-label="メニュー">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
  </header>

  <!-- カテゴリ・タグバー -->
  <div class="category-tag-bar">
    <div class="category-dropdown" id="categoryDropdown">
      <span class="category-current" id="categoryCurrent">すべて</span>
      <span class="dropdown-arrow">▽</span>

      <div class="category-pulldown" id="categoryPulldown">
        <div class="pulldown-item active" data-category="all">
          <span class="category-item-icon">🗂️</span><span>すべて</span>
        </div>
        <div class="pulldown-item" data-category="game">
          <span class="category-item-icon">🎮</span><span>ゲーム</span>
        </div>
        <div class="pulldown-item" data-category="app">
          <span class="category-item-icon">📱</span><span>アプリ</span>
        </div>
        <div class="pulldown-item" data-category="site">
          <span class="category-item-icon">🌐</span><span>サイト</span>
        </div>
        <div class="pulldown-item" data-category="video">
          <span class="category-item-icon">🎬</span><span>映像</span>
        </div>
      </div>
    </div>

    <div class="tag-list" id="tagList">
      <!-- タグはJSで生成 -->
    </div>
  </div>

  <!-- タグ一覧パネル（カテゴリ名クリックで開閉） -->
  <div class="tag-panel" id="tagPanel">
    <!-- タグはJSで生成 -->
  </div>

  <!-- 本体 -->
  <div class="body-container">

    <!-- サイドバー -->
    <aside class="sidebar">
      <div class="category-list-section">
        <div class="category-list-header">カテゴリ 一覧</div>

        <div class="category-item active" data-category="all">
          <span class="category-item-icon">🗂️</span>
          <span class="category-item-label">すべて</span>
        </div>
        <div class="category-item" data-category="game">
          <span class="category-item-icon">🎮</span>
          <span class="category-item-label">ゲーム</span>
        </div>
        <div class="category-item" data-category="app">
          <span class="category-item-icon">📱</span>
          <span class="category-item-label">アプリ</span>
        </div>
        <div class="category-item" data-category="site">
          <span class="category-item-icon">🌐</span>
          <span class="category-item-label">サイト</span>
        </div>
        <div class="category-item" data-category="video">
          <span class="category-item-icon">🎬</span>
          <span class="category-item-label">映像</span>
        </div>
      </div>

      <div class="pin-section">
        <div class="category-item" id="pinItem">
          <span class="category-item-icon">📌</span>
          <span class="category-item-label">ピン止め</span>
        </div>
      </div>

      <div class="post-button-area">
        <button class="post-button" id="postButton">＋ 投稿する</button>
      </div>
    </aside>

    <!-- 投稿一覧 -->
    <main class="content-area" id="contentArea">
      <div class="posts-grid" id="postsGrid">
        <!-- 投稿カードはJSで生成 -->
      </div>
    </main>

  </div>
</div>

<!-- 投稿詳細モーダル -->
<div class="modal-overlay" id="detailModalOverlay">
  <div class="modal" id="detailModal">
    <button class="modal-close" id="detailModalClose">×</button>

    <div class="post-header modal-header">
      <div class="post-avatar" id="detailAvatar"></div>
      <span class="post-author" id="detailAuthor"></span>
    </div>

    <h2 class="modal-title" id="detailTitle"></h2>

    <div class="post-content-box modal-content-box" id="detailDesc"></div>

    <div class="modal-image-box" id="detailImageBox">
      <!-- サムネイルはJSで生成 -->
    </div>

    <div class="post-tags modal-tags" id="detailTags"></div>

    <div class="post-footer modal-footer">
      <span class="post-date" id="detailDate"></span>
      <span class="post-likes" id="detailLikes"></span>
    </div>

    <div class="modal-actions">
      <button class="modal-btn pin" id="detailPinBtn">ピン止めする</button>
    </div>
  </div>
</div>

<!-- 投稿作成モーダル -->
<div class="modal-overlay" id="postModalOverlay">
  <div class="modal post-modal cat-game" id="postModal">
    <button class="modal-close" id="postModalClose">×</button>
    <h2 class="modal-title">投稿を作成</h2>

    <form id="postForm">
      <div class="form-group">
        <label for="postTitleInput">タイトル</label>
        <input type="text" id="postTitleInput" placeholder="募集内容のタイトルを入力" maxlength="30" required>
        <span class="char-counter" id="titleCharCounter">0 / 30</span>
      </div>

      <div class="form-group">
        <label for="postCategoryInput">カテゴリ</label>
        <select id="postCategoryInput">
          <option value="game">ゲーム</option>
          <option value="app">アプリ</option>
          <option value="site">サイト</option>
          <option value="video">映像</option>
        </select>
      </div>

      <div class="form-group">
        <label for="postDescInput">詳細</label>
        <textarea id="postDescInput" placeholder="募集内容の詳細を入力" maxlength="500"></textarea>
        <span class="char-counter" id="descCharCounter">0 / 500</span>
      </div>

      <div class="form-group">
        <label>画像（任意・最大4枚）</label>
        <label class="file-input-label" for="postImageInput" id="fileInputDisplay">ファイルが選択されていません</label>
        <input type="file" id="postImageInput" accept="image/*" multiple class="visually-hidden">
        <div class="image-preview-container" id="imagePreviewContainer"></div>
      </div>

      <div class="form-group">
        <label>タグ（選択）</label>
        <div class="post-tag-dropdown" id="postTagDropdown">
          <div class="post-tag-dropdown-display" id="postTagDropdownDisplay">
            <span class="post-tag-display-text placeholder" id="postTagDisplayText">選択してください</span>
            <span class="dropdown-arrow">▽</span>
          </div>
          <div class="post-tag-dropdown-panel" id="postTagDropdownPanel">
            <div class="post-tag-selector" id="postTagSelector"></div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="postTagsInput">タグ（自由記入・カンマ区切り）</label>
        <input type="text" id="postTagsInput" placeholder="例：チーム募集,週末開発">
      </div>

      <div class="form-group">
        <label for="postDeadlineInput">募集期限</label>
        <div class="deadline-input-wrap">
          <input type="number" id="postDeadlineInput" min="1" max="365" value="30">
          <span class="deadline-unit">日間</span>
        </div>
      </div>

      <button type="submit" class="form-submit">投稿する</button>
    </form>
  </div>
</div>

<!-- アイコントリムモーダル -->
<div class="avatar-crop-overlay" id="avatarCropOverlay">
  <div class="avatar-crop-modal">
    <h3 class="avatar-crop-title">アイコンの範囲を選択</h3>
    <div class="avatar-crop-container" id="avatarCropContainer">
      <img class="avatar-crop-image" id="avatarCropImage" alt="" draggable="false">
      <div class="avatar-crop-circle"></div>
    </div>
    <div class="avatar-crop-zoom-wrap">
      <span class="avatar-crop-zoom-label">縮小</span>
      <input type="range" class="avatar-crop-zoom" id="avatarCropZoom" min="0" max="100" value="0">
      <span class="avatar-crop-zoom-label">拡大</span>
    </div>
    <div class="avatar-crop-actions">
      <button type="button" class="avatar-crop-btn cancel" id="avatarCropCancel">キャンセル</button>
      <button type="button" class="avatar-crop-btn confirm" id="avatarCropConfirm">決定</button>
    </div>
  </div>
</div>

<!-- ライトボックス -->
<div class="lightbox-overlay" id="lightboxOverlay">
  <img id="lightboxImage" alt="">
</div>

<!-- ログアウト確認モーダル -->
<div class="confirm-overlay" id="logoutConfirmOverlay">
  <div class="confirm-modal">
    <p class="confirm-message">ログアウトしますか？</p>
    <img class="confirm-image" src="images/loper_LogoutIcon.png" alt="">
    <div class="confirm-actions">
      <button class="confirm-btn ok" id="logoutConfirmOk">OK</button>
      <button class="confirm-btn cancel" id="logoutConfirmCancel">キャンセル</button>
    </div>
  </div>
</div>

<!-- 設定画面 -->
<div class="modal-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <button class="modal-close" id="settingsCloseBtn">×</button>
    <h2 class="modal-title">設定</h2>

    <div class="settings-section">
      <h3 class="settings-section-title">名前を変更</h3>
      <div class="settings-name-row">
        <input type="text" class="settings-name-input" id="settingsNameInput" maxlength="20" placeholder="名前を入力">
        <button class="settings-name-save" id="settingsNameSave" type="button">保存</button>
      </div>
    </div>

    <div class="settings-section">
      <div class="settings-pulldown-header" id="expiredPulldownHeader">
        <h3 class="settings-section-title">期限切れ募集</h3>
        <span class="settings-pulldown-arrow" id="expiredPulldownArrow">▽</span>
      </div>
      <div class="expired-posts-list" id="expiredPostsList" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- アイコン削除確認モーダル -->
<div class="confirm-overlay" id="iconDeleteConfirmOverlay">
  <div class="confirm-modal">
    <p class="confirm-message">アイコンを削除します。</p>
    <img class="confirm-image" src="images/loper_IcondeleteIcon.png" alt="">
    <div class="confirm-actions">
      <button class="confirm-btn ok" id="iconDeleteConfirmOk">OK</button>
      <button class="confirm-btn cancel" id="iconDeleteConfirmCancel">キャンセル</button>
    </div>
  </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- ログイン促進モーダル -->
<div class="modal-overlay" id="loginPromptOverlay">
  <div class="login-prompt-modal">
    <button class="modal-close" id="loginPromptClose">×</button>
    <div class="login-prompt-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </div>
    <h2 class="login-prompt-title">ログインが必要です</h2>
    <p class="login-prompt-message">投稿するにはログインしてください</p>
    <button class="github-login-btn login-prompt-btn" id="loginPromptGithubBtn" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
      GitHubでログイン
    </button>
  </div>
</div>

<!-- メニュー画面（画面右からスライド表示） -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-panel" id="menuPanel">
    <div class="menu-panel-header">
      <button class="menu-close-btn" id="menuCloseBtn" aria-label="閉じる">×</button>
    </div>

    <div class="menu-profile-area">
      <div class="menu-profile-icon" id="menuProfileIcon"></div>
      <div class="menu-profile-name" id="menuProfileName">名前</div>
    </div>

    <nav class="menu-list">
      <a class="menu-list-item" href="https://hitoki1103.github.io/PixelArt/" target="_blank" rel="noopener">ドット絵ツール</a>
    </nav>
  </div>
</div>

<!-- プロフィール画面（画面左からスライド表示） -->
<div class="profile-overlay" id="profileOverlay">
  <div class="profile-panel" id="profilePanel">
    <div class="profile-panel-header">
      <button class="profile-icon-btn" id="profileCloseBtn" aria-label="メイン画面へ戻る">×</button>
      <button class="profile-icon-btn" id="profileSettingsBtn" aria-label="設定">⚙</button>
    </div>

    <!-- ログイン前 -->
    <div class="profile-login-section" id="profileLoginSection">
      <div class="profile-login-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <p class="profile-login-message">ログインしてプロフィールを<br>管理しましょう</p>
      <button class="github-login-btn" id="githubLoginBtn" type="button">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHubでログイン
      </button>
    </div>

    <!-- ログイン後 -->
    <div class="profile-content" id="profileContent" style="display:none;">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatar"></div>
        <button type="button" class="profile-avatar-delete-btn" id="profileAvatarDeleteBtn" title="アイコンを削除">×</button>
        <input type="file" id="profileAvatarInput" accept="image/*" class="visually-hidden">
      </div>

      <div class="profile-name-display" id="profileNameInput">名前</div>

      <textarea class="profile-bio" id="profileBio" placeholder="自己紹介や説明文を入力してください"></textarea>

      <div class="profile-links" id="profileLinks"></div>
      <button class="profile-add-link-btn" id="profileAddLinkBtn" type="button">＋ リンクを追加</button>

      <button class="profile-logout-btn" id="profileLogoutBtn" type="button">ログアウト</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, GithubAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAp7tJpiTHP27bKIK5orCivTqvzalIZWGw",
    authDomain: "loper-81ec3.firebaseapp.com",
    projectId: "loper-81ec3",
    storageBucket: "loper-81ec3.firebasestorage.app",
    messagingSenderId: "76995793678",
    appId: "1:76995793678:web:0798cb548723e041e2fd5f"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._firebase = {
    auth, db,
    GithubAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
    doc, setDoc, getDoc,
  };
</script>
</body>
</html>
