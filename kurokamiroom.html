<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黒髪ちゃんのへや</title>
<link rel="icon" href="images/loper_MainIcon.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", "Meiryo", sans-serif;
    color: #ADE6EE;
  }

  .room-container {
    text-align: center;
    padding: 48px 32px;
  }

  .character-img {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #5577E0;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 28px;
    margin-bottom: 12px;
    color: #ffffff;
  }

  .back-link {
    display: inline-block;
    margin-top: 32px;
    padding: 12px 28px;
    background: #5577E0;
    color: #ffffff;
    border-radius: 24px;
    text-decoration: none;
    font-size: 15px;
    font-weight: bold;
    transition: filter 0.15s;
  }

  .back-link:hover {
    filter: brightness(1.1);
  }
</style>
</head>
<body>
  <div class="room-container">
    <img src="images/loper_MainIcon.png" alt="くろかみ" class="character-img">
    <h1>黒髪ちゃんのへや</h1>
    <p>ここは黒髪ちゃんの部屋です。</p>
    <a href="index.html" class="back-link">← もどる</a>
  </div>
</body>
</html>
